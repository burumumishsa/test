# BetterStopV2 Configuration File

# Time before the server shuts down
shutdown-timer: 30

# Bossbar
bossbar-title: "&cStopping server in {seconds} seconds..."

# Bossbar color
# RED, BLUE, GREEN, YELLOW, PINK, PURPLE, WHITE
bossbar-color: RED

# Bossbar style
# SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
bossbar-style: SOLID

# Prefix used for warning messages
prefix: "&8[&c&lWARNING&8] "

# Send warning messages at these seconds
warning-seconds:
  - 10
  - 20
  - 30
  - 45
  - 60
  - 5
  - 4
  - 3
  - 1
  - 2